<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing | Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            color: #213251;
            background:
                radial-gradient(circle at 12% 14%, #f8fcff 0%, #e9f5ff 28%, rgba(233, 245, 255, 0) 55%),
                radial-gradient(circle at 88% 82%, #e2f2ff 0%, #d6ecff 24%, rgba(214, 236, 255, 0) 52%),
                linear-gradient(145deg, #fbfeff 0%, #edf7ff 44%, #f3faff 100%);
        }

        .scene { position: fixed; inset: 0; z-index: 0; pointer-events: none; perspective: 1400px; transform-style: preserve-3d; }
        .floating-shapes { position: absolute; inset: 0; }
        .shape { position: absolute; opacity: 0.34; filter: blur(0.4px); transform-style: preserve-3d; animation: float 16s ease-in-out infinite; }
        .shape-1 { width: 420px; height: 420px; top: -10%; left: -8%; border-radius: 42% 58% 65% 35% / 38% 48% 52% 62%; background: linear-gradient(135deg, rgba(159, 230, 255, 0.9), rgba(111, 176, 255, 0.55)); box-shadow: 0 30px 70px rgba(111, 176, 255, 0.25); }
        .shape-2 { width: 350px; height: 350px; top: 48%; right: -8%; border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; background: linear-gradient(135deg, rgba(190, 242, 241, 0.9), rgba(118, 203, 250, 0.5)); box-shadow: 0 30px 70px rgba(118, 203, 250, 0.24); animation-delay: -6s; }
        .shape-3 { width: 240px; height: 240px; bottom: 4%; left: 18%; border-radius: 50%; background: linear-gradient(135deg, rgba(194, 214, 255, 0.95), rgba(130, 166, 248, 0.55)); box-shadow: 0 24px 58px rgba(130, 166, 248, 0.24); animation-delay: -11s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translate3d(18px, -28px, 60px) rotate(5deg); }
            75% { transform: translate3d(-16px, 26px, 52px) rotate(-5deg); }
        }

        .navbar { position: fixed; top: 0; width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.62); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid rgba(164, 198, 231, 0.45); box-shadow: 0 8px 30px rgba(132, 175, 216, 0.18); }
        .logo { font-size: 22px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logo i { color: #2aa9e8; }
        .logo span { background: linear-gradient(135deg, #2398df, #2f7cf4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .main-content { padding: 100px 30px 30px; max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }
        h2 { text-align: center; margin-bottom: 30px; }

        .search-section, .patient-info, .bill-section { background: rgba(255,255,255,0.72); border: 1px solid rgba(170, 201, 230, 0.58); border-radius: 20px; box-shadow: 0 18px 42px rgba(129, 172, 211, 0.16); }
        .search-section { padding: 30px; margin-bottom: 30px; }
        .search-section h3, .patient-info h4, .bill-section h3 { color: #1f8fd8; margin-bottom: 20px; }
        .search-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; }
        .form-group { margin-bottom: 0; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.9; color: #4f6484; }
        .form-group input { width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.88); border: 1px solid rgba(167, 201, 233, 0.75); border-radius: 10px; color: #1f3557; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #74bde9; box-shadow: 0 0 0 4px rgba(116,189,233,0.2); }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #39c4ee, #3a82f2); color: #082645; font-weight: 700; }

        .patient-info { padding: 25px; margin-bottom: 30px; display: none; }
        .patient-info.show { display: block; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .info-item { background: rgba(255,255,255,0.76); padding: 15px; border-radius: 10px; border: 1px solid rgba(166, 198, 228, 0.35); }
        .info-item label { font-size: 12px; opacity: 0.8; display: block; margin-bottom: 5px; color: #5d7290; }
        .info-item span { font-size: 16px; font-weight: bold; }

        .bill-section { padding: 25px; margin-bottom: 30px; display: none; }
        .bill-section.show { display: block; }

        .bill-table { width: 100%; border-collapse: collapse; }
        .bill-table th, .bill-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(166, 198, 228, 0.35); }
        .bill-table th { background: rgba(111, 186, 236, 0.18); color: #1f8fd8; }
        .total-row { background: rgba(176, 235, 223, 0.36); }
        .total-row td { font-weight: bold; color: #2abca6; font-size: 18px; }

        .payment-section { text-align: center; display: none; }
        .payment-section.show { display: block; }
        .pay-btn { padding: 20px 60px; font-size: 20px; background: linear-gradient(135deg, #6ee0cf, #65bff1); border: none; border-radius: 30px; color: #0a334f; font-weight: bold; cursor: pointer; box-shadow: 0 15px 34px rgba(95,178,164,0.28); }

        .message { padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .message.error { background: rgba(255,180,180,0.4); color: #b34141; border: 1px solid rgba(222,110,110,0.35); }
        .message.success { background: rgba(176, 235, 223, 0.48); color: #2b957f; border: 1px solid rgba(86, 184, 160, 0.35); }
        
        @media (max-width: 768px) { .search-form { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="scene">
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-heartbeat"></i><span>Smart Healthcare</span></div>
    </nav>

    <div class="main-content">
        <h2>Patient Billing</h2>

        <div class="search-section">
            <h3><i class="fas fa-search"></i> Find Patient</h3>
            <div class="search-form">
                <div class="form-group">
                    <label>Patient Name</label>
                    <input type="text" id="patientName" placeholder="Enter Patient Name">
                </div>
                <div class="form-group">
                    <label>Patient ID</label>
                    <input type="text" id="patientId" placeholder="Enter Patient ID">
                </div>
                <button class="btn btn-primary" onclick="searchPatient()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>

        <div id="message"></div>

        <div class="patient-info" id="patientInfo">
            <h4><i class="fas fa-user"></i> Patient Information</h4>
            <div class="info-grid">
                <div class="info-item"><label>Patient ID</label><span id="pId">-</span></div>
                <div class="info-item"><label>Name</label><span id="pName">-</span></div>
                <div class="info-item"><label>Age</label><span id="pAge">-</span></div>
                <div class="info-item"><label>Gender</label><span id="pGender">-</span></div>
                <div class="info-item"><label>Phone</label><span id="pPhone">-</span></div>
                <div class="info-item"><label>Type</label><span id="pType">-</span></div>
            </div>
        </div>

        <div class="bill-section" id="billSection">
            <h3><i class="fas fa-file-invoice-dollar"></i> Bill Details</h3>
            <table class="bill-table">
                <thead>
                    <tr><th>Item</th><th>Description</th><th>Amount (INR)</th></tr>
                </thead>
                <tbody id="billTableBody"></tbody>
                <tfoot><tr class="total-row"><td colspan="2">Total Bill Amount</td><td id="totalAmount">INR 0</td></tr></tfoot>
            </table>
        </div>

        <div class="payment-section" id="paymentSection">
            <button class="pay-btn" onclick="processPayment()">
                <i class="fas fa-credit-card"></i> Proceed to Pay
            </button>
        </div>
    </div>

    <script>
        const API_BASE = "/api";
        let currentPatient = null;
        let currentBill = 0;

        function getToken() { return localStorage.getItem("hms_token") || sessionStorage.getItem("hms_token"); }
        function getAuthHeaders() { return { "Authorization": "Bearer " + getToken(), "Content-Type": "application/json" }; }

        const billItems = {
            "OP": [
                { item: "Consultation Fee", desc: "Doctor Consultation", amount: 500 },
                { item: "Medical Checkup", desc: "General Examination", amount: 300 },
                { item: "Lab Tests", desc: "Blood Test, CBC", amount: 800 },
                { item: "Medicines", desc: "Prescribed Medicines", amount: 450 }
            ],
            "IP-General": [
                { item: "Room Charges", desc: "General Ward - 5 days", amount: 5000 },
                { item: "Doctor Visit", desc: "Daily Rounds - 5 days", amount: 2500 },
                { item: "Nursing Charges", desc: "24/7 Care - 5 days", amount: 2000 },
                { item: "Medicines", desc: "In-patient Medicines", amount: 3500 },
                { item: "Lab Tests", desc: "Various Tests", amount: 2500 },
                { item: "Food Charges", desc: "Meals - 5 days", amount: 1000 }
            ]
        };

        function showMessage(msg, type) {
            document.getElementById('message').innerHTML = '<div class="message ' + type + '">' + msg + '</div>';
            setTimeout(function() { document.getElementById('message').innerHTML = ''; }, 5000);
        }

        async function searchPatient() {
            var nameQuery = document.getElementById('patientName').value.trim();
            var idQuery = document.getElementById('patientId').value.trim();

            if (!nameQuery && !idQuery) {
                showMessage('Please enter patient name or ID', 'error');
                return;
            }

            try {
                var res = await fetch(API_BASE + "/patients", { headers: getAuthHeaders() });
                
                if (!res.ok) {
                    showMessage('Failed to connect. Please login first.', 'error');
                    return;
                }
                
                var text = await res.text();
                var patients = text ? JSON.parse(text) : [];
                
                if (patients.length === 0) {
                    showMessage('No patients in system', 'error');
                    return;
                }
                
                var patient = null;
                if (idQuery) {
                    patient = patients.find(function(p) { return p.id == idQuery; });
                } else if (nameQuery) {
                    patient = patients.find(function(p) { return p.name && p.name.toLowerCase().includes(nameQuery.toLowerCase()); });
                }

                if (!patient) {
                    showMessage('Patient not found. Check name or ID.', 'error');
                    return;
                }

                currentPatient = patient;
                
                document.getElementById('patientInfo').classList.add('show');
                document.getElementById('pId').innerText = patient.id || '-';
                document.getElementById('pName').innerText = patient.name || '-';
                document.getElementById('pAge').innerText = patient.age || '-';
                document.getElementById('pGender').innerText = patient.gender || '-';
                document.getElementById('pPhone').innerText = patient.phone || '-';
                document.getElementById('pType').innerText = 'OP';

                showBill('OP');
                
            } catch(e) {
                console.error(e);
                showMessage('Error: ' + e.message, 'error');
            }
        }

        function showBill(type) {
            var billData = billItems[type] || billItems["OP"];
            
            var tbody = '';
            var total = 0;

            billData.forEach(function(item) {
                tbody += '<tr><td>' + item.item + '</td><td>' + item.desc + '</td><td>INR ' + item.amount.toLocaleString() + '</td></tr>';
                total += item.amount;
            });

            document.getElementById('billTableBody').innerHTML = tbody;
            currentBill = total;
            document.getElementById('totalAmount').innerText = 'INR ' + total.toLocaleString();
            document.getElementById('billSection').classList.add('show');
            document.getElementById('paymentSection').classList.add('show');
            showMessage('Patient found!', 'success');
        }

        function processPayment() {
            if (currentBill === 0) return;
            
            var confirmPay = confirm('Total: INR ' + currentBill.toLocaleString() + '\n\nClick OK to pay');
            
            if (confirmPay) {
                alert('Payment Successful!\n\nThank you for choosing Smart Healthcare');
                document.getElementById('patientName').value = '';
                document.getElementById('patientId').value = '';
                document.getElementById('patientInfo').classList.remove('show');
                document.getElementById('billSection').classList.remove('show');
                document.getElementById('paymentSection').classList.remove('show');
                currentPatient = null;
                currentBill = 0;
            }
        }
    </script>
</body>
</html>
