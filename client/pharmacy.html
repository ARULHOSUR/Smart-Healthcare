        .shape-1 { width: 420px; height: 420px; top: -10%; left: -8%; border-radius: 42% 58% 65% 35% / 38% 48% 52% 62%; background: linear-gradient(135deg, rgba(159, 230, 255, 0.9), rgba(111, 176, 255, 0.55)); box-shadow: 0 30px 70px rgba(111, 176, 255, 0.25); }
        .shape-2 { width: 350px; height: 350px; top: 48%; right: -8%; border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; background: linear-gradient(135deg, rgba(190, 242, 241, 0.9), rgba(118, 203, 250, 0.5)); box-shadow: 0 30px 70px rgba(118, 203, 250, 0.24); animation-delay: -6s; }
        .shape-3 { width: 240px; height: 240px; bottom: 4%; left: 18%; border-radius: 50%; background: linear-gradient(135deg, rgba(194, 214, 255, 0.95), rgba(130, 166, 248, 0.55)); box-shadow: 0 24px 58px rgba(130, 166, 248, 0.24); animation-delay: -11s; }

            75% { transform: translate3d(-16px, 26px, 52px) rotate(-5deg); }

        .cart-icon { position: relative; cursor: pointer; padding: 10px 20px; border-radius: 25px; background: rgba(198, 223, 245, 0.7); color: #29466b; border: 1px solid rgba(156, 194, 227, 0.65); }
        .cart-icon .badge { position: absolute; top: -5px; right: -5px; background: #ff8f8f; color: #5f1f1f; border-radius: 50%; padding: 2px 8px; font-size: 12px; font-weight: 700; }

        .main-content { padding: 100px 30px 30px; position: relative; z-index: 1; }

        .patient-search-section, .medicine-card, .search-bar input, .category-tab, .cart-item, .cart-sidebar, .search-section {
            border: 1px solid rgba(170, 201, 230, 0.58);
            box-shadow: 0 18px 42px rgba(129, 172, 211, 0.14);
        }

        .patient-search-section { background: rgba(255,255,255,0.72); border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .patient-search-section h4 { color: #1f8fd8; margin-bottom: 15px; }
        .patient-search-row { display: flex; gap: 15px; flex-wrap: wrap; }

        .patient-search-row button { padding: 12px 25px; background: linear-gradient(135deg, #39c4ee, #3a82f2); border: none; border-radius: 10px; color: #082645; cursor: pointer; font-weight: 700; }

        .prescribed-medicines { margin-top: 20px; display: none; }
        .prescribed-medicines.show { display: block; }
        .prescribed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .prescribed-header h5 { color: #2abca6; }
        .prescribed-list { display: flex; flex-direction: column; gap: 10px; }
        .prescribed-item { display: flex; justify-content: space-between; align-items: center; background: rgba(176, 235, 223, 0.36); padding: 15px; border-radius: 10px; border: 1px solid rgba(129, 207, 188, 0.58); }
        .prescribed-item-info h6 { margin-bottom: 5px; }
        .prescribed-item-info p { font-size: 12px; opacity: 0.8; margin: 0; color: #53708f; }
        .prescribed-item button { padding: 8px 15px; background: linear-gradient(135deg, #6ee0cf, #65bff1); border: none; border-radius: 8px; color: #0a334f; cursor: pointer; font-size: 13px; font-weight: 700; }

        .search-bar { max-width: 600px; margin: 0 auto 30px; position: relative; }
        .search-bar input { width: 100%; padding: 15px 50px 15px 25px; background: rgba(255,255,255,0.88); border-radius: 30px; color: #1f3557; font-size: 16px; }

        .search-bar i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #1f8fd8; }

        .category-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .category-tab { padding: 10px 25px; background: rgba(255,255,255,0.66); border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .category-tab:hover, .category-tab.active { background: rgba(157, 208, 241, 0.35); border-color: #84c3ef; color: #1a4f7a; }

        .medicines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }

        .medicine-card { background: rgba(255,255,255,0.72); border-radius: 20px; padding: 20px; transition: 0.3s; }
        .medicine-card:hover { transform: translateY(-6px); box-shadow: 0 24px 56px rgba(91, 161, 224, 0.22); border-color: #84c3ef; }
        .medicine-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #74cff0, #6ba7f5); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 15px; color: #15395f; }
        .medicine-card h4 { margin-bottom: 5px; font-size: 16px; }
        .medicine-card .category { color: #1f8fd8; font-size: 12px; margin-bottom: 10px; }
        .medicine-card .price { font-size: 20px; font-weight: bold; color: #2abca6; margin-bottom: 10px; }
        .medicine-card .stock { font-size: 12px; color: #d38a43; margin-bottom: 15px; }
        .medicine-card .manufacturer { font-size: 11px; opacity: 0.8; margin-bottom: 10px; color: #5b6f8c; }

        .add-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, #39c4ee, #3a82f2); border: none; border-radius: 10px; color: #082645; cursor: pointer; transition: 0.3s; font-weight: 700; }
        .add-btn:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(87,169,231,0.34); }

        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 400px; height: 100vh; background: rgba(247, 252, 255, 0.98); z-index: 200; padding: 30px; transition: 0.4s; overflow-y: auto; border-left: 1px solid rgba(168, 200, 230, 0.55); color: #213251; }
        .cart-sidebar.show { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(166, 198, 228, 0.35); }
        .close-cart { background: none; border: none; color: #34557f; font-size: 24px; cursor: pointer; }

        .remove-btn { background: none; border: none; color: #dd6d6d; cursor: pointer; font-size: 18px; }

        .cart-footer { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(166, 198, 228, 0.35); }
        .cart-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; margin-bottom: 20px; }

        .toast.show { display: block; animation: fadeInOut 2s; }

        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 20% { opacity: 1; transform: translateX(-50%) translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; } }

</head>

                <i class="fas fa-arrow-left"></i> Back
            </button>

            </div>
            <div class="prescribed-medicines" id="prescribedMedicines">

                    <h5><i class="fas fa-prescription"></i> Prescribed Medicines</h5>

                        <i class="fas fa-cart-plus"></i> Add All to Cart
                    </button>
                </div>
                <div class="prescribed-list" id="prescribedList"></div>
            </div>
        </div>

        <div class="search-bar">

        </div>

        <div class="category-tabs">

            <div class="category-tab" onclick="filterCategory('pain')">Pain Relief</div>
            <div class="category-tab" onclick="filterCategory('antibiotic')">Antibiotics</div>
            <div class="category-tab" onclick="filterCategory('diabetes')">Diabetes</div>
            <div class="category-tab" onclick="filterCategory('cardiac')">Cardiac</div>
            <div class="category-tab" onclick="filterCategory('gastro')">Gastro</div>
            <div class="category-tab" onclick="filterCategory('respiratory')">Respiratory</div>
            <div class="category-tab" onclick="filterCategory('derma')">Skin Care</div>
            <div class="category-tab" onclick="filterCategory('vitamin')">Vitamins</div>
            <div class="category-tab" onclick="filterCategory('eye')">Eye Care</div>
        </div>

        <div class="medicines-grid" id="medicinesGrid"></div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>
        
        <div id="cartItems">

        </div>

        <div class="cart-footer" id="cartFooter" style="display: none;">

            <button class="checkout-btn" onclick="checkout()">

            </button>
        </div>
    </div>

            { id: 77, name: "Calcium + Vitamin D", category: "vitamin", price: 70, stock: 280, manufacturer: "GSK" },
            { id: 78, name: "Zinc Tablets", category: "vitamin", price: 25, stock: 400, manufacturer: "Cipla" },
            { id: 79, name: "Multivitamin Syrup", category: "vitamin", price: 120, stock: 150, manufacturer: "GSK" },
            { id: 80, name: "Biotin 10mg", category: "vitamin", price: 90, stock: 180, manufacturer: "Abbott" },
            
            // Eye Care
            { id: 81, name: "Tears Plus Drops", category: "eye", price: 80, stock: 200, manufacturer: "Allergan" },
            { id: 82, name: "Refresh Tears Drops", category: "eye", price: 120, stock: 150, manufacturer: "Allergan" },
            { id: 83, name: "Ofloxacin Eye Drops", category: "eye", price: 45, stock: 250, manufacturer: "Cipla" },
            { id: 84, name: "Ciprofloxacin Eye Drops", category: "eye", price: 50, stock: 200, manufacturer: "Sun Pharma" },
            { id: 85, name: "Timolol Eye Drops", category: "eye", price: 90, stock: 100, manufacturer: "Cipla" },
            { id: 86, name: "Brinzolamide Eye Drops", category: "eye", price: 150, stock: 80, manufacturer: "Cipla" },
            { id: 87, name: "Prednisolone Eye Drops", category: "eye", price: 60, stock: 150, manufacturer: "Allergan" },
            { id: 88, name: "Ketorolac Eye Drops", category: "eye", price: 70, stock: 120, manufacturer: "Sun Pharma" },
            { id: 89, name: "Tobramycin Eye Drops", category: "eye", price: 55, stock: 180, manufacturer: "Cipla" },
            { id: 90, name: "Systane Ultra Drops", category: "eye", price: 200, stock: 100, manufacturer: "Alcon" }
        ];

        let cart = [];
        let currentFilter = 'all';
        let prescribedMeds = [];

        function getAuthHeaders() {
            const token = sessionStorage.getItem("hms_token") || localStorage.getItem("hms_token");
            return {
                "Authorization": "Bearer " + token,
                "Content-Type": "application/json"
            };
        }

        async function searchPrescribedMedicines() {
            const patientName = document.getElementById('patientNameInput').value.trim();
            if (!patientName) {
                showToast('Please enter patient name');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/emr`, { headers: getAuthHeaders() });
                const text = await res.text();
                const emrList = (text && text.trim()) ? JSON.parse(text) : [];
                
                // Filter EMRs by patient name
                const matchingEMRs = emrList.filter(e => {
                    const pName = e.patient ? e.patient.name : '';
                    return pName.toLowerCase().includes(patientName.toLowerCase());
                });

                const prescribedDiv = document.getElementById('prescribedMedicines');
                const prescribedList = document.getElementById('prescribedList');
                
                if (matchingEMRs.length === 0) {
                    showToast('No prescriptions found for this patient');
                    prescribedDiv.classList.remove('show');
                    return;
                }

                // Extract medicines from treatmentPlan/notes
                prescribedMeds = [];
                matchingEMRs.forEach(emr => {
                    const treatment = emr.treatmentPlan || emr.treatment || '';
                    const notes = emr.notes || '';
                    const fullText = treatment + ' ' + notes;
                    
                    // Match medicine names from our inventory
                    medicines.forEach(med => {
                        if (fullText.toLowerCase().includes(med.name.toLowerCase().split(' ')[0])) {
                            if (!prescribedMeds.find(m => m.id === med.id)) {
                                prescribedMeds.push(med);
                            }
                        }
                    });
                });

                if (prescribedMeds.length === 0) {
                    showToast('No matching medicines found in inventory');
                    prescribedDiv.classList.remove('show');
                    return;
                }

                prescribedList.innerHTML = prescribedMeds.map(med => `
                    <div class="prescribed-item">
                        <div class="prescribed-item-info">
                            <h6>${med.name}</h6>
                            <p>${med.manufacturer} | ${med.category.toUpperCase()}</p>
                        </div>
                        <button onclick="addToCart(${med.id})">
                            <i class="fas fa-plus"></i> Add
                        </button>
                    </div>
                `).join('');

                prescribedDiv.classList.add('show');
                showToast(`Found ${prescribedMeds.length} prescribed medicines`);

            } catch (e) {
                console.error('Error searching prescriptions:', e);
                showToast('Error searching prescriptions');
            }
        }

        function addAllPrescribed() {
            prescribedMeds.forEach(med => addToCart(med.id, false));
            showToast('All prescribed medicines added to cart!');
        }

        function renderMedicines(filteredMedicines = medicines) {
            const grid = document.getElementById('medicinesGrid');
            grid.innerHTML = filteredMedicines.map(med => `
                <div class="medicine-card">
                    <div class="medicine-icon"><i class="fas fa-pills"></i></div>
                    <h4>${med.name}</h4>
                    <div class="manufacturer">${med.manufacturer}</div>
                    <div class="category">${med.category.toUpperCase()}</div>
                    <div class="price">₹${med.price}</div>
                    <div class="stock"><i class="fas fa-box"></i> ${med.stock} available</div>
                    <button class="add-btn" onclick="addToCart(${med.id})">
                        <i class="fas fa-plus"></i> Add to Cart
                    </button>
                </div>
            `).join('');
        }

        function filterCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (category === 'all') {
                renderMedicines(medicines);
            } else {
                const filtered = medicines.filter(m => m.category === category);
                renderMedicines(filtered);
            }
        }

        function filterMedicines() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = medicines;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(m => m.category === currentFilter);
            }
            
            if (query) {
                filtered = filtered.filter(m => m.name.toLowerCase().includes(query) || m.manufacturer.toLowerCase().includes(query));
            }
            
            renderMedicines(filtered);
        }

        function addToCart(id, showMsg = true) {
            const medicine = medicines.find(m => m.id === id);
            const existingItem = cart.find(item => item.id === id);
            
            if (existingItem) {
                if (existingItem.qty < medicine.stock) {
                    existingItem.qty++;
                } else {
                    showToast('Maximum quantity reached!');
                    return;
                }
            } else {
                cart.push({ ...medicine, qty: 1 });
            }
            
            updateCartUI();
            if (showMsg) {
                showToast(medicine.name + ' added to cart!');
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            const medicine = medicines.find(m => m.id === id);
            
            if (item) {
                const newQty = item.qty + change;
                if (newQty > 0 && newQty <= medicine.stock) {
                    item.qty = newQty;
                } else if (newQty <= 0) {
                    removeFromCart(id);
                    return;
                }
            }
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="empty-cart"><i class="fas fa-shopping-basket"></i><p>Your cart is empty</p></div>';
                cartFooter.style.display = 'none';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h5>${item.name}</h5>
                            <p>₹${item.price} each</p>
                        </div>
                        <div class="cart-item-actions">
                            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
                
                const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                document.getElementById('cartTotal').innerText = '₹' + total;
                cartFooter.style.display = 'block';
            }
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('show');
            document.getElementById('overlay').classList.toggle('show');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function checkout() {
            if (cart.length === 0) {
                showToast('Cart is empty!');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            // Store cart data for payment page
            localStorage.setItem('pharmacyCart', JSON.stringify(cart));
            localStorage.setItem('pharmacyTotal', total);
            
            // Redirect to payment page
            window.location.href = 'payment.html';
        }

        // Initialize
        renderMedicines();
    </script>
</body>
