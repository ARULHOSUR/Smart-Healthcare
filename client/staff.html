<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Recruitment | Smart Healthcare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            color: #213251;
            padding: 30px 18px;
            background:
                radial-gradient(circle at 12% 14%, #f8fcff 0%, #e9f5ff 28%, rgba(233, 245, 255, 0) 55%),
                radial-gradient(circle at 88% 82%, #e2f2ff 0%, #d6ecff 24%, rgba(214, 236, 255, 0) 52%),
                linear-gradient(145deg, #fbfeff 0%, #edf7ff 44%, #f3faff 100%);
        }

        .scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            perspective: 1400px;
            transform-style: preserve-3d;
        }

        .floating-shapes {
            position: absolute;
            inset: 0;
        }

        .shape {
            position: absolute;
            opacity: 0.34;
            filter: blur(0.4px);
            transform-style: preserve-3d;
            animation: float 16s ease-in-out infinite;
        }

        .shape-1 {
            width: 420px;
            height: 420px;
            top: -10%;
            left: -8%;
            border-radius: 42% 58% 65% 35% / 38% 48% 52% 62%;
            background: linear-gradient(135deg, rgba(159, 230, 255, 0.9), rgba(111, 176, 255, 0.55));
            box-shadow: 0 30px 70px rgba(111, 176, 255, 0.25);
        }

        .shape-2 {
            width: 350px;
            height: 350px;
            top: 48%;
            right: -8%;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            background: linear-gradient(135deg, rgba(190, 242, 241, 0.9), rgba(118, 203, 250, 0.5));
            box-shadow: 0 30px 70px rgba(118, 203, 250, 0.24);
            animation-delay: -6s;
        }

        .shape-3 {
            width: 240px;
            height: 240px;
            bottom: 4%;
            left: 18%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(194, 214, 255, 0.95), rgba(130, 166, 248, 0.55));
            box-shadow: 0 24px 58px rgba(130, 166, 248, 0.24);
            animation-delay: -11s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translate3d(18px, -28px, 60px) rotate(5deg); }
            75% { transform: translate3d(-16px, 26px, 52px) rotate(-5deg); }
        }

        .page-wrap {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title i {
            color: #2aa9e8;
        }

        .title span {
            background: linear-gradient(135deg, #2398df, #2f7cf4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .panel {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(170, 201, 230, 0.58);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 18px 42px rgba(129, 172, 211, 0.16);
        }

        .panel h4 {
            margin-bottom: 16px;
            font-size: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .form-group label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 6px;
            display: block;
            color: #4f6484;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(167, 201, 233, 0.75);
            border-radius: 9px;
            color: #1f3557;
            font-size: 14px;
            padding: 10px 12px;
        }

        .form-group select option {
            background: #eff8ff;
            color: #1f3557;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #74bde9;
            box-shadow: 0 0 14px rgba(116,189,233,0.25);
        }

        .btn-main {
            margin-top: 14px;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            color: #082645;
            background: linear-gradient(135deg, #39c4ee, #3a82f2);
            font-weight: 700;
        }

        .btn-main:hover {
            box-shadow: 0 10px 24px rgba(87,169,231,0.34);
        }

        .btn-back {
            border: 1px solid rgba(152, 190, 223, 0.45);
            border-radius: 10px;
            padding: 8px 12px;
            color: #274164;
            background: rgba(201, 225, 247, 0.58);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            color: #274164;
            background: rgba(201, 225, 247, 0.86);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            border-bottom: 1px solid rgba(166, 198, 228, 0.35);
            padding: 11px 12px;
            text-align: left;
            font-size: 14px;
        }

        .data-table th {
            color: #1f8fd8;
            background: rgba(111, 186, 236, 0.18);
            font-weight: 700;
        }

        .data-table tr:hover {
            background: rgba(157, 208, 241, 0.14);
        }

        .empty-row {
            text-align: center;
            opacity: 0.7;
            padding: 25px 12px;
            color: #5d7290;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 22px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <div class="page-wrap">
        <div class="topbar">
            <div class="title">
                <i class="fas fa-users-cog"></i>
                <span>Staff Recruitment</span>
            </div>
            <a class="btn-back" href="admin.html">
                <i class="fas fa-arrow-left"></i> Back to Admin Dashboard
            </a>
        </div>

        <div class="panel">
            <h4><i class="fas fa-user-plus"></i> Add Staff</h4>
            <div class="form-grid">
                <div class="form-group">
                    <label for="staffName">Staff Name</label>
                    <input id="staffName" type="text" placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label for="staffPhone">Phone Number</label>
                    <input id="staffPhone" type="text" placeholder="Enter phone number">
                </div>
                <div class="form-group">
                    <label for="staffAge">Age</label>
                    <input id="staffAge" type="number" min="18" placeholder="Enter age">
                </div>
                <div class="form-group">
                    <label for="staffGender">Gender</label>
                    <select id="staffGender">
                        <option value="">Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="staffShift">Assigned Shift</label>
                    <select id="staffShift">
                        <option value="">Select shift</option>
                        <option value="Morning">Morning</option>
                        <option value="Afternoon">Afternoon</option>
                        <option value="Night">Night</option>
                    </select>
                </div>
            </div>
            <button class="btn-main" onclick="addStaff()"><i class="fas fa-save"></i> Add Staff</button>
        </div>

        <div class="panel">
            <h4><i class="fas fa-list"></i> Existing Staff</h4>
            <div style="overflow-x:auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone Number</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Assigned Shift</th>
                        </tr>
                    </thead>
                    <tbody id="staffTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "/api";

        function getToken() {
            return sessionStorage.getItem("hms_token") || localStorage.getItem("hms_token");
        }

        function getAuthHeaders() {
            return {
                "Authorization": "Bearer " + getToken(),
                "Content-Type": "application/json"
            };
        }

        function validateSession() {
            let user = null;
            const sessionUser = sessionStorage.getItem("user");
            if (sessionUser) {
                user = JSON.parse(sessionUser);
            } else {
                const localUser = localStorage.getItem("user");
                if (localUser) {
                    user = JSON.parse(localUser);
                    sessionStorage.setItem("user", localUser);
                }
            }

            if (!user || (user.role || "").toLowerCase() !== "admin") {
                alert("Access denied. Admin only.");
                window.location.href = "login.html";
            }
        }

        async function loadStaff() {
            try {
                const response = await fetch(`${API_BASE}/staff`, { headers: getAuthHeaders() });
                const text = await response.text();
                const staff = text && text.trim() ? JSON.parse(text) : [];

                const tbody = document.getElementById("staffTableBody");
                if (!Array.isArray(staff) || staff.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-row">No staff records found</td></tr>';
                    return;
                }

                const pickValue = (person, keys) => {
                    for (const key of keys) {
                        const value = person[key];
                        if (value !== undefined && value !== null && String(value).trim() !== "") {
                            return value;
                        }
                    }
                    return "-";
                };

                tbody.innerHTML = staff.map(person => `
                    <tr>
                        <td>${pickValue(person, ["name", "staffName"])}</td>
                        <td>${pickValue(person, ["phone", "phoneNumber", "staffPhone"])}</td>
                        <td>${pickValue(person, ["age", "staffAge"])}</td>
                        <td>${pickValue(person, ["gender", "staffGender"])}</td>
                        <td>${pickValue(person, ["shift", "assignedShift", "staffShift"])}</td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById("staffTableBody").innerHTML = '<tr><td colspan="5" class="empty-row">Unable to load staff records</td></tr>';
            }
        }

        async function addStaff() {
            const payload = {
                name: document.getElementById("staffName").value.trim(),
                staffName: document.getElementById("staffName").value.trim(),
                phone: document.getElementById("staffPhone").value.trim(),
                phoneNumber: document.getElementById("staffPhone").value.trim(),
                age: document.getElementById("staffAge").value.trim(),
                staffAge: document.getElementById("staffAge").value.trim(),
                gender: document.getElementById("staffGender").value,
                staffGender: document.getElementById("staffGender").value,
                assignedShift: document.getElementById("staffShift").value,
                shift: document.getElementById("staffShift").value,
                role: "Staff"
            };

            if (!payload.name || !payload.phone || !payload.age || !payload.gender || !payload.assignedShift) {
                alert("Please enter all staff details before adding.");
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/staff`, {
                    method: "POST",
                    headers: getAuthHeaders(),
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const message = await response.text();
                    throw new Error(message || "Failed to add staff");
                }

                document.getElementById("staffName").value = "";
                document.getElementById("staffPhone").value = "";
                document.getElementById("staffAge").value = "";
                document.getElementById("staffGender").value = "";
                document.getElementById("staffShift").value = "";

                await loadStaff();
                alert("Staff added successfully.");
            } catch (error) {
                alert("Could not add staff: " + error.message);
            }
        }

        validateSession();
        loadStaff();
    </script>
</body>
</html>
