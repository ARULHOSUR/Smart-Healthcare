# ================= APPLICATION CONFIGURATION =================
spring.application.name=hms-backend

# ===================== DATABASE (MySQL) =====================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hmsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:HOSur@2006}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / HIBERNATE ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================= SQL INITIALIZATION ======================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ======================== JWT CONFIG =======================
jwt.secret=${JWT_SECRET:c3VwZXItdmVyeS1zZWNyZXQtZGVtby1rZXktMjU2LS0tLS0=}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

# ======================== LOGGING ==========================
logging.level.root=INFO
logging.level.com.hms=DEBUG
logging.level.org.springframework.web=INFO

# ==================== SERVER SETTINGS ======================
server.port=${SERVER_PORT:9091}

# ==================== STATIC FILES (serve client/ on Render) =============
spring.web.resources.static-locations=file:./client/,classpath:/static/

# ==================== EXTERNAL SERVICES (use env vars) ====================
twilio.accountSid=${TWILIO_ACCOUNT_SID:}
twilio.authToken=${TWILIO_AUTH_TOKEN:}
twilio.phoneNumber=${TWILIO_PHONE_NUMBER:}
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gemini-2.5-flash}
openai.max-tokens=300
openai.temperature=0.7