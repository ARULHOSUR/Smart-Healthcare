services:

  mysql:
    image: mysql:8.0
    container_name: hms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: HOSur@2006
      MYSQL_DATABASE: hmsdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hms-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: HOSur@2006
      SERVER_PORT: 9091
    ports:
      - "9091:9091"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./client
    container_name: hms-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
